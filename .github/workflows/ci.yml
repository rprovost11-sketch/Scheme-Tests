name: CI

# Test-coverage initiative, Phase 2. The scheme-tests umbrella, tiered:
#   fast (push/PR)          -- build cpp + py fast subset + cross-port diff + fuzz smoke (catch test edits)
#   full (nightly + manual) -- both full batteries (shrunk TCO soak) + cross-port + larger fuzz
# Repos checked out as siblings (scheme-tests, 3PyScheme, 4CPPScheme2) so the cross-port/fuzz
# suites resolve the sibling cpp exe by relative path. Cross-repo checkout uses CROSS_REPO_TOKEN.
# cross-port + fuzz now run via `]suites` (shell-free Scheme drivers, py-hosted).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  fast:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: scheme-tests }
      - uses: actions/checkout@v4
        with: { repository: rprovost11-sketch/3PyScheme, token: '${{ secrets.CROSS_REPO_TOKEN }}', path: 3PyScheme }
      - uses: actions/checkout@v4
        with: { repository: rprovost11-sketch/4CPPScheme2, token: '${{ secrets.CROSS_REPO_TOKEN }}', path: 4CPPScheme2 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build cppScheme2 (Release)
        working-directory: 4CPPScheme2
        run: |
          cmake -B build
          cmake --build build --config Release --target cppscheme2
      - name: Fast subset + cross-port + fuzz smoke (py-hosted; catch broken test edits)
        shell: bash
        run: |
          out="$(cd 3PyScheme && printf ']suites feature regression cross-port fuzz-smoke\n' | python -m pyscheme -T ../scheme-tests 2>&1)"
          echo "$out" | tail -8
          echo "$out" | grep -q 'ALL SUITES PASSED' || { echo "$out"; echo '::error::fast suite failed'; exit 1; }

  full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: scheme-tests }
      - uses: actions/checkout@v4
        with: { repository: rprovost11-sketch/3PyScheme, token: '${{ secrets.CROSS_REPO_TOKEN }}', path: 3PyScheme }
      - uses: actions/checkout@v4
        with: { repository: rprovost11-sketch/4CPPScheme2, token: '${{ secrets.CROSS_REPO_TOKEN }}', path: 4CPPScheme2 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build cppScheme2 (Release)
        working-directory: 4CPPScheme2
        run: |
          cmake -B build
          cmake --build build --config Release --target cppscheme2
      - name: Both full batteries (shrunk TCO soak)
        shell: bash
        run: |
          for port in "3PyScheme:python -m pyscheme" "4CPPScheme2:./build/Release/cppscheme2.exe"; do
            dir="${port%%:*}"; cmd="${port#*:}"
            out="$(cd "$dir" && printf ']feature\n]regression\n]compliance -I:10000\n' | $cmd -T ../scheme-tests 2>&1)"
            echo "== $dir =="; echo "$out" | grep -E 'passed across|FAILED|failed' | tail -6
            echo "$out" | grep -qE 'FAIL' && { echo "$out"; echo "::error::$dir battery failed"; exit 1; } || true
          done
      - name: Cross-port differential + larger fuzz (py-hosted)
        shell: bash
        env: { FUZZ_N: '200' }
        run: |
          out="$(cd 3PyScheme && printf ']suites cross-port fuzz-smoke\n' | python -m pyscheme -T ../scheme-tests 2>&1)"
          echo "$out" | tail -8
          echo "$out" | grep -q 'ALL SUITES PASSED' || { echo "$out"; echo '::error::cross-port/fuzz failed'; exit 1; }
